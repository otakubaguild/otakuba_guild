<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#050505">
<title>おたく場ギルド Ver.3</title>
<link rel="stylesheet" href="main.css">
<link rel="stylesheet" href="menu.css">
<link rel="stylesheet" href="battle.css">
<link rel="stylesheet" href="effects.css">
</head>
<body>
<div class="app" id="app">
  <div class="bg" id="appBg"></div>
  <div class="scan"></div>

  <section class="screen active center" id="screenStart">
    <div class="window panel">
      <div class="title-logo">おたく場<br>ギルド</div>
      <p class="subtitle">メニューを開きますか？</p>
      <div class="row choice">
        <button class="btn gold" id="btnStartYes">はい</button>
        <button class="btn" id="btnStartNo">いいえ</button>
      </div>
    </div>
  </section>

  <section class="screen center" id="screenName">
    <div class="window panel">
      <div class="dialog-name">ギルド受付</div>
      <div class="dialog-text">冒険者名を記入してください。</div>
      <div class="form-grid mt">
        <input id="nameInput" placeholder="冒険者名">
        <button class="btn gold" id="btnNameOk">登録する</button>
      </div>
    </div>
  </section>

  <section class="screen" id="screenMenu">
    <div class="hud">
      <div class="guild-card panel">
        <div class="guild-name">冒険者カード</div>
        <div class="adventurer" id="adventurerName">冒険者</div>
      </div>
      <div class="level-badge panel" id="levelBadge">Lv.1</div>
    </div>

    <div class="tabs" id="tabs"></div>
    <div class="content" id="menuList"></div>

    <div class="bottom-bar">
      <button class="btn" id="btnOrders">受注一覧</button>
      <button class="btn green" id="btnCheckout">クエスト達成</button>
    </div>
  </section>

  <section class="screen center" id="screenBattle">
    <div class="battle-scene">
      <div class="battle-stage" id="battleStage">草原</div>
      <img id="battleEnemy" class="battle-enemy-big" alt="">
      <div class="battle-fallback-big hidden" id="battleFallback">⚔️</div>
      <div class="hp-box">
        <div class="hp-top"><span id="battleEnemyName">敵</span><span id="battleHpText">0 / 0</span></div>
        <div class="hp-bar"><div class="hp-fill" id="battleHpFill"></div></div>
      </div>
      <div class="damage-pop hidden" id="damagePop"></div>
      <div class="defeat-pop hidden" id="defeatPop">撃破！</div>
    </div>
  </section>

  <section class="screen" id="screenOrders">
    <div class="window panel">
      <div class="dialog-name">受注一覧</div>
      <div id="orderList" class="order-list"></div>
      <div class="total" id="orderTotal">合計 0G</div>
      <div class="row mt">
        <button class="btn" id="btnBackMenu">戻る</button>
        <button class="btn gold" id="btnConfirmOrder">受注する</button>
      </div>
    </div>
  </section>

  <section class="screen center" id="screenComplete">
    <div class="window panel">
      <div class="complete-mark">★</div>
      <div class="dialog-text">クエスト達成！<br>ご来店ありがとうございました。</div>
      <button class="btn gold mt" id="btnReturn">帰還する</button>
    </div>
  </section>

  <div class="toast" id="toast"><div class="panel" id="toastText"></div></div>
</div>

<script src="storage.js"></script>
<script src="audio.js"></script>
<script src="discord.js"></script>
<script src="battle.js"></script>
<script src="menu.js"></script>
<script src="app.js"></script>
</body>
</html>
