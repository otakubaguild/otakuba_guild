<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#050505">
<title>おたく場ギルド Ver.3</title>
<style>
:root{
  --gold:#f6c84f;--white:#fff6df;--green:#73ff5f;--red:#ff6767;
  --line:rgba(246,200,79,.72);--panel:rgba(4,8,14,.68);
  --shadow:0 0 0 2px #1b1203,0 0 0 4px rgba(246,200,79,.72),0 10px 28px rgba(0,0,0,.48);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:var(--white);font-family:"Hiragino Sans","Yu Gothic",Meiryo,monospace}
button,input,textarea,select{font:inherit}
button{color:inherit;cursor:pointer;border:0;background:none}
input,textarea,select{color:var(--white);background:rgba(0,0,0,.62);border:2px solid var(--line);border-radius:8px;padding:10px;outline:none;width:100%}
.app{position:relative;width:100vw;max-width:480px;height:100dvh;margin:0 auto;overflow:hidden;background:#000;isolation:isolate}
.bg{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.02),rgba(0,0,0,.12) 50%,rgba(0,0,0,.78) 86%),url("grass.png") center top/cover no-repeat;z-index:-3}
.scan{position:absolute;inset:0;pointer-events:none;z-index:5;background:repeating-linear-gradient(to bottom,rgba(255,255,255,.025),rgba(255,255,255,.025) 1px,transparent 2px,transparent 5px);opacity:.12}
.screen{position:absolute;inset:0;display:none;padding:14px 12px calc(14px + env(safe-area-inset-bottom));animation:fadeIn .2s ease both}
.screen.active{display:flex;flex-direction:column}
.center{justify-content:center;align-items:center;text-align:center}
.panel{background:linear-gradient(180deg,rgba(7,12,20,.60),rgba(0,3,8,.72));backdrop-filter:blur(2.5px);-webkit-backdrop-filter:blur(2.5px);border:3px solid rgba(255,246,223,.88);border-radius:12px;box-shadow:var(--shadow);padding:12px;position:relative}
.window{width:100%;max-width:430px}
.title-logo{font-size:30px;letter-spacing:1px;color:var(--gold);text-shadow:3px 3px 0 #000,0 0 18px rgba(246,200,79,.7);line-height:1.45}
.subtitle{margin-top:20px;font-size:18px;text-shadow:2px 2px 0 #000}
.row{display:flex;gap:10px}.row>*{flex:1}
.choice{margin-top:18px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px;padding:10px 12px;border:3px solid var(--white);border-radius:9px;background:rgba(0,0,0,.74);box-shadow:inset 0 -4px 0 rgba(255,255,255,.08),0 4px 0 rgba(0,0,0,.45);text-shadow:2px 2px 0 #000}
.btn:active{transform:translateY(2px)}
.btn.gold{color:#1d1300;background:linear-gradient(#ffe58a,#c89225);text-shadow:none;border-color:#fff6c8;font-weight:700}
.btn.green{color:#051b00;background:linear-gradient(#9cff8b,#37b72a);text-shadow:none;border-color:#d9ffd4;font-weight:700}
.btn.red{background:linear-gradient(#5b1111,#210000);border-color:#ffaaaa;color:#ffd6d6}
.btn.small{min-height:32px;padding:5px 8px;font-size:12px;border-width:2px}
.dialog-name{color:var(--gold);margin-bottom:8px}
.dialog-text{font-size:17px;line-height:1.55}
.form-grid{display:grid;gap:8px}
.mt{margin-top:12px}.hidden{display:none!important}.tiny{font-size:12px;opacity:.78;line-height:1.5}
.toast{position:absolute;left:14px;right:14px;bottom:calc(16px + env(safe-area-inset-bottom));z-index:60;display:none}
.toast.show{display:block;animation:pop .2s ease both}
.complete-mark{font-size:54px;color:var(--gold);text-shadow:0 0 20px var(--gold)}
@keyframes fadeIn{from{opacity:0;filter:blur(2px)}to{opacity:1;filter:blur(0)}}
@keyframes pop{from{transform:translateY(10px) scale(.98);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
@media (min-width:700px){body:before{content:"スマホ縦画面専用アプリです";position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;color:#fff;z-index:99999}.app{display:none}}
@media (orientation:landscape){body:before{content:"端末を縦にしてください";position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;color:#fff;z-index:99999}.app{display:none}}


.hud{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.guild-card{min-width:0;flex:1;padding:9px 12px!important}
.guild-name{font-size:12px;color:var(--gold)}
.adventurer{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.level-badge{font-size:15px;padding:8px 10px!important;white-space:nowrap;color:var(--green)}
.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:7px;background:rgba(0,0,0,.16);border-radius:10px;padding:3px}
.tab{font-size:11px;min-height:40px;padding:5px 2px;border:2px solid rgba(255,255,255,.85);border-radius:8px;background:rgba(0,0,0,.65);text-shadow:1px 1px 0 #000}
.tab.active{color:#1a1200;background:linear-gradient(#ffe58a,#c89225);font-weight:700;text-shadow:none}
.content{flex:1;min-height:0;overflow:auto;padding:0 2px 104px;scrollbar-width:none}.content::-webkit-scrollbar{display:none}
.product{display:grid;grid-template-columns:64px 1fr 78px;gap:7px;align-items:center;margin-bottom:7px;padding:7px;border:1px solid rgba(246,200,79,.46);border-radius:12px;background:linear-gradient(180deg,rgba(8,14,24,.54),rgba(0,3,8,.62));backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);box-shadow:0 7px 18px rgba(0,0,0,.24)}
.product-img{width:64px;height:64px;border-radius:9px;border:2px solid var(--line);background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;font-size:30px;overflow:hidden;grid-row:1 / span 3}
.product-img img{width:100%;height:100%;object-fit:cover}
.product-title{grid-column:2;color:var(--gold);font-size:14px;margin-bottom:1px}
.product-desc{grid-column:2;font-size:10.5px;line-height:1.28;opacity:.9}
.product-price{grid-column:2;color:var(--green);font-size:14px;margin:2px 0}
.product .btn{grid-column:3;grid-row:1 / span 3;align-self:center;min-height:38px;padding:5px 7px;font-size:13px;font-weight:800}
.bottom-bar{position:absolute;left:12px;right:12px;bottom:calc(10px + env(safe-area-inset-bottom));z-index:12;display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0;padding:8px;border:3px solid var(--white);border-radius:12px;background:rgba(0,0,0,.72);box-shadow:var(--shadow)}
.bottom-bar .btn{min-height:48px}
.order-list{margin-top:8px;max-height:58dvh;overflow:auto}
.order-item{display:grid;grid-template-columns:1fr auto;gap:8px;padding:8px 0;border-bottom:1px dashed rgba(255,255,255,.35)}
.qty{display:flex;gap:5px;align-items:center}.qty-num{min-width:28px;text-align:center;color:var(--gold)}
.total{font-size:19px;color:var(--green);text-align:right;margin-top:12px}
.empty{padding:22px 8px;text-align:center;opacity:.82;line-height:1.7}
@media (max-height:740px){
  .guild-card{padding:7px 10px!important}.adventurer{font-size:13px}.level-badge{font-size:14px}
  .tab{min-height:36px;font-size:10.5px}
  .product{grid-template-columns:56px 1fr 74px;padding:6px;margin-bottom:6px}
  .product-img{width:56px;height:56px;font-size:26px}
  .product-title{font-size:13px}.product-desc{font-size:10px}.product-price{font-size:13px}
}


.battle-scene{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;text-align:center}
.battle-stage{position:absolute;top:calc(20px + env(safe-area-inset-top));left:16px;right:16px;color:var(--gold);font-size:18px;text-shadow:2px 2px 0 #000}
.battle-enemy-big{max-width:62%;max-height:34dvh;filter:drop-shadow(0 14px 14px rgba(0,0,0,.7));animation:enemyIdle 1.8s ease-in-out infinite}
.battle-fallback-big{font-size:96px;filter:drop-shadow(0 12px 12px rgba(0,0,0,.65))}
.hp-box{position:absolute;left:16px;right:16px;bottom:calc(72px + env(safe-area-inset-bottom));padding:10px 12px;border:3px solid var(--white);border-radius:12px;background:rgba(0,0,0,.72);box-shadow:var(--shadow)}
.hp-top{display:flex;justify-content:space-between;gap:12px;font-size:13px;margin-bottom:6px}
.hp-bar{height:13px;border:1px solid rgba(255,255,255,.75);background:#050505;border-radius:999px;overflow:hidden}
.hp-fill{height:100%;width:100%;background:linear-gradient(90deg,#37b72a,#9cff8b);transition:width .35s ease}
.damage-pop{position:absolute;top:28%;left:50%;transform:translateX(-50%);font-size:30px;font-weight:900;color:#fff2a5;text-shadow:3px 3px 0 #000,0 0 18px rgba(255,70,70,.95);animation:damagePop .95s ease both;z-index:5}
.defeat-pop{position:absolute;top:19%;left:50%;transform:translateX(-50%);font-size:42px;font-weight:900;color:var(--gold);text-shadow:4px 4px 0 #000,0 0 22px rgba(246,200,79,.95);animation:defeatPop 1.1s ease both;z-index:6}
.battle-hit{animation:battleHit .36s ease!important}.battle-defeat{animation:battleDefeat .8s ease forwards!important}
@keyframes enemyIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes battleHit{0%,100%{transform:translateX(0)}20%{transform:translateX(-12px) translateY(-4px)}40%{transform:translateX(12px) translateY(2px)}60%{transform:translateX(-7px)}80%{transform:translateX(5px)}}
@keyframes battleDefeat{0%{opacity:1;transform:scale(1)}45%{opacity:.85;transform:scale(1.08)}100%{opacity:0;transform:scale(.7) translateY(20px)}}
@keyframes damagePop{0%{opacity:0;transform:translateX(-50%) translateY(18px) scale(.7)}25%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.15)}100%{opacity:0;transform:translateX(-50%) translateY(-44px) scale(1)}}
@keyframes defeatPop{0%{opacity:0;transform:translateX(-50%) scale(.6)}35%{opacity:1;transform:translateX(-50%) scale(1.18)}100%{opacity:0;transform:translateX(-50%) scale(1) translateY(-20px)}}


.fade-out-ui{animation:uiFadeOut .22s ease forwards}.fade-in-ui{animation:uiFadeIn .22s ease forwards}
@keyframes uiFadeOut{to{opacity:0;filter:blur(2px);transform:scale(.99)}}
@keyframes uiFadeIn{from{opacity:0;filter:blur(2px);transform:scale(.99)}to{opacity:1;filter:blur(0);transform:scale(1)}}

</style>
</head>
<body>
<div class="app" id="app">
  <div class="bg" id="appBg"></div>
  <div class="scan"></div>

  <section class="screen active center" id="screenStart">
    <div class="window panel">
      <div class="title-logo">おたく場<br>ギルド</div>
      <p class="subtitle">メニューを開きますか？</p>
      <div class="row choice">
        <button class="btn gold" id="btnStartYes">はい</button>
        <button class="btn" id="btnStartNo">いいえ</button>
      </div>
    </div>
  </section>

  <section class="screen center" id="screenName">
    <div class="window panel">
      <div class="dialog-name">ギルド受付</div>
      <div class="dialog-text">冒険者名を記入してください。</div>
      <div class="form-grid mt">
        <input id="nameInput" placeholder="冒険者名">
        <button class="btn gold" id="btnNameOk">登録する</button>
      </div>
    </div>
  </section>

  <section class="screen" id="screenMenu">
    <div class="hud">
      <div class="guild-card panel">
        <div class="guild-name">冒険者カード</div>
        <div class="adventurer" id="adventurerName">冒険者</div>
      </div>
      <div class="level-badge panel" id="levelBadge">Lv.1</div>
    </div>

    <div class="tabs" id="tabs"></div>
    <div class="content" id="menuList"></div>

    <div class="bottom-bar">
      <button class="btn" id="btnOrders">受注一覧</button>
      <button class="btn green" id="btnCheckout">クエスト達成</button>
    </div>
  </section>

  <section class="screen center" id="screenBattle">
    <div class="battle-scene">
      <div class="battle-stage" id="battleStage">草原</div>
      <img id="battleEnemy" class="battle-enemy-big" alt="">
      <div class="battle-fallback-big hidden" id="battleFallback">⚔️</div>
      <div class="hp-box">
        <div class="hp-top"><span id="battleEnemyName">敵</span><span id="battleHpText">0 / 0</span></div>
        <div class="hp-bar"><div class="hp-fill" id="battleHpFill"></div></div>
      </div>
      <div class="damage-pop hidden" id="damagePop"></div>
      <div class="defeat-pop hidden" id="defeatPop">撃破！</div>
    </div>
  </section>

  <section class="screen" id="screenOrders">
    <div class="window panel">
      <div class="dialog-name">受注一覧</div>
      <div id="orderList" class="order-list"></div>
      <div class="total" id="orderTotal">合計 0G</div>
      <div class="row mt">
        <button class="btn" id="btnBackMenu">戻る</button>
        <button class="btn gold" id="btnConfirmOrder">受注する</button>
      </div>
    </div>
  </section>

  <section class="screen center" id="screenComplete">
    <div class="window panel">
      <div class="complete-mark">★</div>
      <div class="dialog-text">クエスト達成！<br>ご来店ありがとうございました。</div>
      <button class="btn gold mt" id="btnReturn">帰還する</button>
    </div>
  </section>

  <div class="toast" id="toast"><div class="panel" id="toastText"></div></div>
</div>

  function clone(v){ return JSON.parse(JSON.stringify(v)); }
  function get(key, fallback){
    try{ 
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    }catch(e){ return fallback; }
  }
  function set(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
  async function init(){
    const settings = get(keys.settings, clone(DEFAULT_SETTINGS));
    const menu = get(keys.menu, clone(DEFAULT_MENU));
    const monsters = get(keys.monsters, clone(DEFAULT_MONSTERS));
    set(keys.settings, settings); set(keys.menu, menu); set(keys.monsters, monsters);
    return {settings, menu, monsters};
  }
  return {keys, get, set, init};
})();


window.GuildAudio = {
  play(type){
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      const f = type === "bad" ? 120 : type === "hit" ? 180 : type === "defeat" ? 440 : 660;
      osc.frequency.value = f; gain.gain.value = 0.035;
      osc.start(); osc.stop(ctx.currentTime + 0.08);
    }catch(e){}
  }
};


window.GuildDiscord = {
  async notifyOrder(order, settings){
    const url = settings && settings.discordWebhookUrl;
    if(!url) return {ok:false, skipped:true};
    const lines = order.items.map(i => `・${i.name} ×${i.qty} = ${i.price*i.qty}G`).join("\\n");
    const body = {
      content: `⚔️ 新規受注\\n冒険者: ${order.name}\\n合計: ${order.total}G\\n${lines}`
    };
    try{
      const res = await fetch(url, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
      return {ok:res.ok};
    }catch(e){ return {ok:false, error:String(e)}; }
  }
};


window.GuildBattle = (() => {
  let monsters = [];
  let state = null;

  function initial(){
    return {index:0, hp: monsters[0]?.hp || 500, defeated:[], totalDamage:0};
  }
  function load(){
    state = GuildStorage.get(GuildStorage.keys.battle, null);
    if(!state || !Number.isFinite(state.index)) state = initial();
    return state;
  }
  function save(){ GuildStorage.set(GuildStorage.keys.battle, state); }
  function current(){ return monsters[Math.min(state.index, monsters.length - 1)] || monsters[0]; }
  function bgPath(m){ return `${m.background}`; }
  function monsterPath(m){ return `${m.image}`; }

  function setBackground(m){
    const bg = document.getElementById("appBg");
    if(bg && m) bg.style.backgroundImage = `linear-gradient(to bottom,rgba(0,0,0,.02),rgba(0,0,0,.12) 50%,rgba(0,0,0,.78) 86%),url("${bgPath(m)}")`;
  }

  function renderBattle(){
    const m = current();
    if(!m) return;
    setBackground(m);
    const img = document.getElementById("battleEnemy");
    const fallback = document.getElementById("battleFallback");
    document.getElementById("battleStage").textContent = m.stage || "";
    document.getElementById("battleEnemyName").textContent = m.name || "敵";
    document.getElementById("battleHpText").textContent = `${Math.max(0,state.hp)} / ${m.hp}`;
    document.getElementById("battleHpFill").style.width = `${Math.max(0,Math.min(100,state.hp/m.hp*100))}%`;
    img.src = monsterPath(m);
    img.classList.remove("hidden","battle-hit","battle-defeat");
    img.onerror = () => { img.classList.add("hidden"); fallback.classList.remove("hidden"); };
    img.onload = () => fallback.classList.add("hidden");
  }

  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  async function attack(amount){
    load();
    const before = current();
    if(!before) return {defeated:false, damage:amount};

    renderBattle();
    const img = document.getElementById("battleEnemy");
    const damagePop = document.getElementById("damagePop");
    const defeatPop = document.getElementById("defeatPop");

    await sleep(250);
    img.classList.add("battle-hit");
    damagePop.textContent = `${amount} DAMAGE!`;
    damagePop.classList.remove("hidden");
    GuildAudio.play("hit");

    let rest = amount;
    let defeated = false;
    while(rest > 0 && state.index < monsters.length){
      const m = current();
      if(rest >= state.hp){
        rest -= state.hp;
        defeated = true;
        state.defeated.push({id:m.id,name:m.name,at:new Date().toISOString()});
        state.index++;
        if(state.index < monsters.length) state.hp = monsters[state.index].hp;
        else state.hp = 0;
      }else{
        state.hp -= rest;
        rest = 0;
      }
    }
    state.totalDamage += amount;
    save();

    await sleep(420);
    damagePop.classList.add("hidden");

    if(defeated){
      img.classList.remove("battle-hit");
      img.classList.add("battle-defeat");
      defeatPop.classList.remove("hidden");
      GuildAudio.play("defeat");
      await sleep(950);
      defeatPop.classList.add("hidden");
    }else{
      await sleep(350);
    }

    renderBattle();
    return {defeated, damage:amount};
  }

  function init(data){
    monsters = data || [];
    load();
    renderBattle();
  }

  return {init, attack, current, setBackground, load};
})();


window.GuildMenu = (() => {
  let settings, menu, activeCategory = "all";
  let order = [];
  let confirmedTotal = 0;

  const $ = id => document.getElementById(id);

  function money(n){ return `${Number(n||0).toLocaleString()}${settings.currency || "G"}`; }
  function total(){ return order.reduce((s,i)=>s+i.price*i.qty,0); }
  function toast(msg){
    $("toastText").textContent = msg;
    $("toast").classList.add("show");
    setTimeout(()=>$("toast").classList.remove("show"),1600);
  }

  function renderTabs(){
    const tabs = $("tabs");
    tabs.innerHTML = "";
    (settings.categories || []).forEach(c => {
      const b = document.createElement("button");
      b.className = "tab" + (activeCategory === c.id ? " active" : "");
      b.textContent = c.name;
      b.onclick = () => { activeCategory = c.id; renderMenu(); renderTabs(); };
      tabs.appendChild(b);
    });
  }

  function renderMenu(){
    const list = $("menuList");
    const items = activeCategory === "all" ? menu : menu.filter(i => i.category === activeCategory);
    list.innerHTML = "";
    items.forEach(item => {
      const card = document.createElement("div");
      card.className = "product";
      const img = item.image ? `<img src="${item.image}" alt="">` : item.icon || "🍽️";
      card.innerHTML = `
        <div class="product-img">${img}</div>
        <div class="product-title">${item.name}</div>
        <div class="product-desc">${item.desc || ""}</div>
        <div class="product-price">${money(item.price)}</div>
        <button class="btn gold">追加</button>
      `;
      card.querySelector("button").onclick = () => add(item.id);
      list.appendChild(card);
    });
  }

  function add(id){
    const item = menu.find(i => i.id === id);
    if(!item) return;
    const found = order.find(i => i.id === id);
    if(found) found.qty++;
    else order.push({...item, qty:1});
    GuildAudio.play("ok");
    toast(`${item.name}を受注一覧に追加`);
  }

  function renderOrders(){
    const list = $("orderList");
    if(!order.length){
      list.innerHTML = `<div class="empty">まだ受注がありません。</div>`;
    }else{
      list.innerHTML = "";
      order.forEach((item, idx) => {
        const row = document.createElement("div");
        row.className = "order-item";
        row.innerHTML = `
          <div>
            <div class="product-title">${item.name}</div>
            <div class="tiny">${money(item.price)} × ${item.qty}</div>
          </div>
          <div class="qty">
            <button class="btn small">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="btn small">＋</button>
          </div>
        `;
        const [minus, plus] = row.querySelectorAll("button");
        minus.onclick = () => { item.qty--; if(item.qty<=0) order.splice(idx,1); renderOrders(); };
        plus.onclick = () => { item.qty++; renderOrders(); };
        list.appendChild(row);
      });
    }
    $("orderTotal").textContent = `合計 ${money(total())}`;
  }

  async function confirm(){
    if(!order.length){ toast("受注がありません"); GuildAudio.play("bad"); return; }
    const damage = Math.max(0, total() - confirmedTotal);
    confirmedTotal = total();

    await GuildDiscord.notifyOrder({
      name: GuildApp.getName(),
      items: order,
      total: total()
    }, settings);

    GuildApp.show("screenBattle");
    await GuildBattle.attack(damage);
    toast("注文をギルドへ送信しました");
    GuildApp.show("screenMenu");
  }

  function checkout(){
    order = [];
    confirmedTotal = 0;
    renderOrders();
    GuildApp.show("screenComplete");
  }

  function init(data){
    settings = data.settings; menu = data.menu;
    renderTabs(); renderMenu();
    $("btnOrders").onclick = () => { renderOrders(); GuildApp.show("screenOrders"); };
    $("btnBackMenu").onclick = () => GuildApp.show("screenMenu");
    $("btnConfirmOrder").onclick = confirm;
    $("btnCheckout").onclick = checkout;
  }
  return {init, renderOrders, total};
})();


window.GuildApp = (() => {
  let data, name = "";

  const $ = id => document.getElementById(id);

  function show(id){
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    $(id).classList.add("active");
  }

  function getName(){ return name || localStorage.getItem("otakuba.v3.name") || "冒険者"; }

  async function init(){
    data = await GuildStorage.init();
    name = localStorage.getItem("otakuba.v3.name") || "";
    GuildBattle.init(data.monsters);
    GuildMenu.init(data);

    $("btnStartYes").onclick = () => {
      GuildAudio.play("ok");
      if(name){ applyName(); show("screenMenu"); }
      else show("screenName");
    };
    $("btnStartNo").onclick = () => {
      GuildAudio.play("bad");
      const t = document.querySelector("#screenStart .subtitle");
      t.textContent = "冷やかしか？さっさとメニューを開け";
    };
    $("btnNameOk").onclick = () => {
      const v = $("nameInput").value.trim();
      if(!v) return;
      name = v; localStorage.setItem("otakuba.v3.name", name);
      applyName();
      GuildAudio.play("ok");
      show("screenMenu");
    };
    $("btnReturn").onclick = () => show("screenStart");
    applyName();
  }

  function applyName(){
    $("adventurerName").textContent = getName();
    const visits = Number(localStorage.getItem("otakuba.v3.visits") || "1");
    $("levelBadge").textContent = `Lv.${Math.max(1, visits)}`;
  }

  return {init, show, getName};
})();
document.addEventListener("DOMContentLoaded", GuildApp.init);

</script>
</body>
</html>
