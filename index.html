<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#050505">
  <title>おたく場ギルド 実働版</title>
  <link rel="stylesheet" href="main.css?v=4.0">
  <link rel="stylesheet" href="battle.css?v=4.0">
  <link rel="stylesheet" href="menu.css?v=4.0">
  <link rel="stylesheet" href="effects.css?v=4.0">
</head>
<body>
  <div class="app">
    <div class="bg" id="pageBg"></div>
    <div class="scan"></div>
    <div id="toast" class="toast"></div>

    <section class="screen active center" id="screenWelcome">
      <div class="panel window">
        <div class="title-logo">おたく場ギルドへ<br>ようこそ</div>
        <div class="subtitle">メニューを開きますか？</div>
        <div class="row choice">
          <button class="btn gold" id="btnStartYes">はい</button>
          <button class="btn" id="btnStartNo">いいえ</button>
        </div>
        <div class="tiny mt">GitHub Pages対応 / v<span id="appVersion">3.0</span></div>
        <button class="btn admin-link mt" id="btnAdmin">🔐 管理者用</button>
      </div>
    </section>

    <section class="screen center" id="screenName">
      <div class="panel window">
        <div class="title-logo small">冒険者登録</div>
        <p>冒険者名を入力してください</p>
        <input id="nameInput" placeholder="例：タロウ" autocomplete="name">
        <div class="row mt">
          <button class="btn gold" id="btnNameOk">新規登録</button>
          <button class="btn" id="btnBackWelcome">戻る</button>
        </div>
        <div class="row mt">
          <button class="btn" id="btnSelectExisting">📋 登録済みの冒険者から選ぶ</button>
        </div>
      </div>
    </section>

    <div id="existingOverlay" class="level-up-overlay">
      <div class="panel window" style="max-width:92vw;width:420px;max-height:80dvh;display:flex;flex-direction:column">
        <div class="title-logo small">冒険者を選択</div>
        <input id="existingSearch" placeholder="名前で検索" style="margin:6px 0">
        <div id="existingList" style="flex:1;overflow-y:auto;text-align:left;margin:8px 0"></div>
        <button class="btn" id="existingClose">閉じる</button>
      </div>
    </div>

    <section class="screen center" id="screenParty">
      <div class="panel window">
        <div class="title-logo small">パーティ人数</div>
        <p>ご来店人数を選択してください</p>
        <div class="party-control">
          <button class="btn" id="btnPartyMinus" type="button">−</button>
          <div class="panel party-count-panel">
            <div id="partyCountView" class="party-count-view">1名</div>
          </div>
          <button class="btn" id="btnPartyPlus" type="button">＋</button>
        </div>
        <div class="tiny" id="chargePreview"></div>
        <div class="row mt">
          <button class="btn gold" id="btnPartyOk">次へ</button>
          <button class="btn" id="btnPartyBack">戻る</button>
        </div>
      </div>
    </section>

    <section class="screen" id="screenMain">
      <div class="rpg">
        <div id="noticeBox"></div>
        <header class="hud">
          <div class="panel hud-card">
            <div class="hud-title">冒険者情報</div>
            <div class="hud-main" id="adventurerName">---</div>
            <div class="tiny" id="adventurerSub">Lv.1 / 二つ名なし</div>
          </div>
          <div class="panel hud-card">
            <div class="hud-title" id="stageName">現在ステージ</div>
            <div class="hud-main" id="enemyName">---</div>
            <div class="tiny" id="enemyHpText">HP 0 / 0</div>
            <div class="hpbar"><div class="hpfill" id="enemyHpFill"></div></div>
          </div>
        </header>

        <main class="battlefield" id="battleField">
          <div class="enemy" id="enemySprite">👾</div>
          <div class="damage" id="damagePop"></div>
          <div class="defeat" id="defeatPop">撃破！</div>
        </main>

        <nav class="categories" id="categoryButtons"></nav>
        <button class="btn gold checkout-main" id="btnCheckout">🏆 クエスト達成（会計）</button>
        <button class="btn checkout-main" id="btnBackTitle">🏠 最初の画面へ</button>
      </div>
    </section>

    <div class="modal" id="modalMenu">
      <div class="modal-head">
        <h2 id="menuTitle">メニュー</h2>
        <button class="btn small" id="btnCloseMenu">閉じる</button>
      </div>
      <div class="scroll" id="productList"></div>
    </div>

    <div class="modal" id="modalOrderConfirm">
      <div class="modal-head">
        <h2>クエスト受注確認</h2>
        <button class="btn small" id="btnCancelOrder">戻る</button>
      </div>
      <div class="scroll">
        <div class="panel">
          <div id="orderConfirmBody" class="confirm-text"></div>
          <div class="row mt">
            <button class="btn gold" id="btnDoOrder">はい、注文する</button>
            <button class="btn" id="btnNoOrder">いいえ</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal" id="modalChargeConfirm">
      <div class="modal-head">
        <h2>ギルド登録料</h2>
        <button class="btn small" id="btnCancelCharge">戻る</button>
      </div>
      <div class="scroll">
        <div class="panel">
          <div id="chargeConfirmBody" class="confirm-text"></div>
          <div class="row mt">
            <button class="btn gold" id="btnDoCharge">登録する</button>
            <button class="btn" id="btnNoCharge">いいえ</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal" id="modalCheckoutConfirm">
      <div class="modal-head">
        <h2>クエスト達成（会計）</h2>
        <button class="btn small" id="btnCancelCheckout">戻る</button>
      </div>
      <div class="scroll">
        <div class="panel">
          <div id="checkoutConfirmBody" class="confirm-text"></div>
          <div class="row mt">
            <button class="btn gold" id="btnDoCheckout">帰還して会計する</button>
            <button class="btn" id="btnNoCheckout">いいえ</button>
          </div>
        </div>
      </div>
    </div>

    <div id="levelUpOverlay" class="level-up-overlay">
      <div class="panel window">
        <div class="level-up-title">LEVEL UP!</div>
        <div id="levelUpText" class="level-up-text"></div>
        <button class="btn gold mt" id="levelUpClose">OK</button>
      </div>
    </div>

    <div id="victoryClearOverlay" class="victory-clear-overlay">
      <img src="victory_clear.png" alt="魔王討伐完了" class="victory-clear-img" onerror="this.style.display='none'">
      <button class="btn gold" id="victoryClearClose">🏠 最初の画面へ</button>
    </div>
  </div>

  <script src="utils.js?v=4.0"></script>
  <script src="storage.js?v=4.0"></script>
  <script src="audio.js?v=4.0"></script>
  <script src="ui.js?v=4.0"></script>
  <script src="customer.js?v=4.0"></script>
  <script src="battle.js?v=4.0"></script>
  <script src="discord.js?v=4.0"></script>
  <script src="menu.js?v=4.0"></script>
  <script src="order.js?v=4.0"></script>
  <script src="app.js?v=4.0"></script>
</body>
</html>
