<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#050505">
<title>おたく場ギルド 管理 Ver.3</title>
<link rel="stylesheet" href="main.css">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="app admin-app">
  <div class="bg"></div>
  <section class="screen active">
    <div class="window panel">
      <h1>管理画面 Ver.3</h1>
      <p class="tiny">iPhone運用用。設定はこの端末のlocalStorageに保存されます。</p>
      <div class="tabs admin-tabs">
        <button class="tab active" data-admin-tab="menu">メニュー</button>
        <button class="tab" data-admin-tab="battle">討伐</button>
        <button class="tab" data-admin-tab="settings">設定</button>
      </div>
      <div id="adminContent"></div>
    </div>
  </section>
  <div class="toast" id="toast"><div class="panel" id="toastText"></div></div>
</div>
<script src="storage.js"></script>
<script src="admin.js"></script>
</body>
</html>
