function assetFile(list,val,fallback){

  return hit?hit.file:val;
}
function assetLabel(list,val){
  val=String(val||'').trim();
  const hit=list.find(a=>a.file===val||a.label===val||a.id===val);
  return hit?hit.label:val;
}
function stageLabelForBg(bg,stage){return assetLabel(STAGE_ASSETS, bg||stage)||stage||'草原'}

const TABS=[['dash','📊 ダッシュボード'],['menu','🍴 メニュー管理'],['orders','📦 注文管理'],['sales','💰 売上管理'],['customers','👤 顧客管理'],['battle','⚔️ 討伐システム'],['notice','📢 本日のお知らせ'],['notify','🔔 通知設定'],['design','🎨 デザイン設定'],['data','💾 データ管理']];

function defaultProducts(){return [{id:uid(),cat:'food',name:'唐揚げ',price:600,emoji:'🍗',desc:'ギルド定番のフード。',image:''},{id:uid(),cat:'food',name:'ポテト',price:500,emoji:'🍟',desc:'みんなでつまめる。',image:''},{id:uid(),cat:'drink',name:'コーラ',price:400,emoji:'🥤',desc:'ソフトドリンク。',image:''},{id:uid(),cat:'drink',name:'メロンソーダ',price:400,emoji:'🥤',desc:'緑の回復薬。',image:''},{id:uid(),cat:'alcohol',name:'生ビール',price:600,emoji:'🍺',desc:'酒場の基本。',image:''},{id:uid(),cat:'alcohol',name:'ハイボール',price:550,emoji:'🥃',desc:'強炭酸。',image:''},{id:uid(),cat:'dessert',name:'アイス',price:350,emoji:'🍨',desc:'食後の甘味。',image:''},{id:uid(),cat:'event',name:'本日の限定',price:700,emoji:'🎉',desc:'イベントメニュー。',image:''}]}
function defaultEnemies(){return [
{id:'slime',name:'スライム',stage:'草原',hp:100,maxHp:100,bg:'grass.png',background:'grass.png',image:'slime.png'},
{id:'goblin',name:'ゴブリン',stage:'森',hp:200,maxHp:200,bg:'forest.png',background:'forest.png',image:'goblin.png'},
{id:'orc',name:'オーク',stage:'森',hp:350,maxHp:350,bg:'forest.png',background:'forest.png',image:'orc.png'},
{id:'skeleton',name:'スケルトン',stage:'遺跡',hp:500,maxHp:500,bg:'ruins.png',background:'ruins.png',image:'skeleton.png'},
{id:'mimic',name:'ミミック',stage:'洞窟',hp:700,maxHp:700,bg:'cave.png',background:'cave.png',image:'mimic.png'},
{id:'gargoyle',name:'ガーゴイル',stage:'山岳',hp:900,maxHp:900,bg:'mountain.png',background:'mountain.png',image:'gargoyle.png'},
{id:'dark_wizard',name:'ダークウィザード',stage:'魔王城',hp:1200,maxHp:1200,bg:'castle.png',background:'castle.png',image:'dark_wizard.png'},
{id:'minotaur',name:'ミノタウロス',stage:'洞窟',hp:1600,maxHp:1600,bg:'cave.png',background:'cave.png',image:'minotaur.png'},
{id:'dragon',name:'ドラゴン',stage:'火山',hp:2200,maxHp:2200,bg:'volcano.png',background:'volcano.png',image:'dragon.png'},
{id:'maou',name:'魔王',stage:'魔王城',hp:3000,maxHp:3000,bg:'castle.png',background:'castle.png',image:'maou.png'}
]}
function defaults(){return {products:defaultProducts(),orders:[],sales:[],customers:[],settings:{notice:{enabled:false,title:'本日のお知らせ',body:'',position:'top'},gasUrl:DEFAULT_GAS_URL,notifyOn:true,currentEnemyIndex:0,enemies:defaultEnemies(),design:{bg:'background.jpg',bgm:''},sharedOrders:[],gasLog:[]},currentCustomer:'',currentCustomerId:''}}
function normalizeEnemy(e,i){const base=defaultEnemies()[i%defaultEnemies().length]||defaultEnemies()[0]; e=e||{}; const max=Number(e.maxHp||e.hp||base.maxHp||100)||100; const hp=Number.isFinite(Number(e.hp))?Math.max(0,Number(e.hp)):max; const bg=assetFile(STAGE_ASSETS, e.bg||e.background||e.stage||base.bg||base.background, base.bg||'grass.png'); const img=assetFile(ENEMY_ASSETS, e.image||e.name||base.image, base.image||'slime.png'); const stage=assetLabel(STAGE_ASSETS, e.stage||bg)||e.stage||base.stage||'草原'; return {id:e.id||base.id||('enemy_'+(i+1)),name:e.name||assetLabel(ENEMY_ASSETS,img)||base.name||('敵'+(i+1)),stage:stage,hp:hp,maxHp:max,bg:bg,background:bg,image:img,bgm:e.bgm||base.bgm||''};}
function migrate(o){const d=defaults(); if(!o||typeof o!=='object')return d; o.products=Array.isArray(o.products)&&o.products.length?o.products:d.products; o.orders=Array.isArray(o.orders)?o.orders:[]; o.sales=Array.isArray(o.sales)?o.sales:[]; o.customers=Array.isArray(o.customers)?o.customers:[]; o.customers.forEach(c=>{if(c&&!c.id)c.id=uid()}); o.settings=o.settings||{}; o.settings.notice=o.settings.notice||d.settings.notice; const oldEnemies=Array.isArray(o.settings.enemies)?o.settings.enemies:[]; const hasOldBroken=oldEnemies.length>10 || oldEnemies.some(e=>e&&((e.bg||e.background)&&!isKnownBg(e.bg||e.background||e.stage)||(e.image&&!isKnownEnemyImg(e.image)))); o.settings.enemies=(oldEnemies.length&&!hasOldBroken?oldEnemies:defaultEnemies()).map(normalizeEnemy); o.settings.currentEnemyIndex=Number.isFinite(+o.settings.currentEnemyIndex)?Math.max(0,Math.min(o.settings.enemies.length-1,+o.settings.currentEnemyIndex)):0; o.settings.gasUrl=o.settings.gasUrl||DEFAULT_GAS_URL; o.settings.notifyOn=o.settings.notifyOn!==false; o.settings.design=o.settings.design||d.settings.design; o.settings.sharedOrders=Array.isArray(o.settings.sharedOrders)?o.settings.sharedOrders:[]; o.settings.gasLog=Array.isArray(o.settings.gasLog)?o.settings.gasLog:[]; o.currentCustomerId=o.currentCustomerId||''; if(!o.currentCustomer&&o.name)o.currentCustomer=o.name; return o;}
function load(){try{let cur=JSON.parse(localStorage.getItem(KEY)); if(cur)return migrate(cur); let old=JSON.parse(localStorage.getItem(OLD)); if(old){old.currentCustomer=old.name||old.currentCustomer||''; return migrate(old)}}catch(e){} return defaults()} let state=load(); function save(){localStorage.setItem(KEY,JSON.stringify(state)); localStorage.setItem(OLD,JSON.stringify(state))}
function $(id){return document.getElementById(id)} function fileUrl(name){name=String(name||'').trim(); if(!name)return 'background.jpg'; if(/^data:image\//.test(name)||/^https?:\/\//.test(name))return name; return name.replace(/\\/g,'/').replace(/^\/+/, '')} function yen(n){return (Number(n)||0).toLocaleString('ja-JP')+'G'} function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))} function today(){return new Date().toLocaleDateString('ja-JP',{timeZone:'Asia/Tokyo'})}

function salesTotal(arr){return arr.filter(s=>s.type!=='cancel').reduce((a,s)=>a+(Number(s.total)||0),0)-arr.filter(s=>s.type==='cancel').reduce((a,s)=>a+(Number(s.total)||0),0)}

function render(){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===current)); const e=currentEnemy(); const todaySales=state.sales.filter(s=>(s.timeText||'').startsWith(today())); const orders=orderItems(); const secs=[];
secs.push(section('dash','<div class="stats"><div class="panel stat"><span>今日の売上</span><b>'+yen(salesTotal(todaySales))+'</b></div><div class="panel stat"><span>注文数</span><b>'+state.sales.filter(s=>s.type!=='cancel').length+'</b></div><div class="panel stat"><span>顧客数</span><b>'+state.customers.length+'</b></div><div class="panel stat"><span>現在の敵</span><b>'+esc(e.name)+'</b><span>HP '+e.hp+'/'+e.maxHp+'</span></div></div><div class="panel" style="margin-top:12px"><b class="goldtxt">現在状態</b><p>端末内受注：'+orders.length+'件 / GAS URL：'+(state.settings.gasUrl?'設定済み':'未設定')+' / 共有注文キャッシュ：'+((state.settings.sharedOrders||[]).length)+'件</p><p class="tiny">GitHub Pagesのみの場合、localStorageは端末ごとです。客スマホ注文を管理者画面に集約するにはGAS台帳連携を使ってください。更新後に古い表示が残る場合はURL末尾に ?v=1.3 を付けてください。</p></div>'));
secs.push(section('menu',renderMenuSec())); secs.push(section('orders',renderOrdersSec())); secs.push(section('sales',renderSalesSec())); secs.push(section('customers',renderCustomerSec())); secs.push(section('battle',renderBattleSec())); secs.push(section('notice',renderNoticeSec())); secs.push(section('notify',renderNotifySec())); secs.push(section('design',renderDesignSec())); secs.push(section('data',renderDataSec())); $('sections').innerHTML=secs.join(''); bind(); save();}

function renderBattleSec(){

  const rows=state.settings.enemies.map((e,i)=>{

      + '<label>現在HP<input type="number" min="0" data-enemy="'+i+'" data-field="hp" value="'+esc(e.hp||0)+'"></label>'
      + '<label>最大HP（金額）<input type="number" min="1" data-enemy="'+i+'" data-field="maxHp" value="'+esc(e.maxHp||e.hp||100)+'"></label>'
      + '<label class="asset-preview">背景<select data-enemy="'+i+'" data-field="bg">'+optionList(bgOptions,assetFile(STAGE_ASSETS,e.bg||e.background||e.stage,'grass.png'))+'</select><img src="'+esc(fileUrl(assetFile(STAGE_ASSETS,e.bg||e.background||e.stage,'grass.png')))+'" onerror="this.style.opacity=.25"></label>'
      + '<label class="asset-preview enemy">敵画像<select data-enemy="'+i+'" data-field="image">'+optionList(imgOptions,assetFile(ENEMY_ASSETS,e.image||e.name,'slime.png'))+'</select><img src="'+esc(fileUrl(assetFile(ENEMY_ASSETS,e.image||e.name,'slime.png')))+'" onerror="this.style.opacity=.25"></label>'
      + '<label>BGM<select data-enemy="'+i+'" data-field="bgm">'+optionList(bgmOptions,e.bgm||'')+'</select><span class="asset-note">音源はGitHub直下にある登録済みBGMから選択</span></label>'
      + '</div>'

      + '<div class="toolbar"><button class="btn gold small" data-saveenemy="'+i+'">この敵を保存</button><button class="btn small" data-currentenemy="'+i+'">現在の敵にする</button><button class="btn small" data-healenemy="'+i+'">HP全回復</button><button class="btn small" data-dupenemy="'+i+'">複製</button><button class="btn red small" data-delenemy="'+i+'">削除</button></div>'
      + '</div>';
  }).join('');
  return '<div class="admin-grid">'
    + '<div class="panel"><h2>現在の敵</h2><p><b class="goldtxt">#'+(idx+1)+' '+esc(cur.name)+'</b></p><p>HP '+cur.hp+' / '+cur.maxHp+'　ステージ：'+esc(cur.stage)+'</p><p class="tiny">敵・背景・BGM・HPはここで変更できます。各カードの「この敵を保存」で一体ずつ確定できます。複製して順番に並べれば複数体構成もOK。</p><div class="toolbar"><button class="btn" id="prevEnemy">前の敵へ</button><button class="btn" id="nextEnemy">次の敵へ</button><button class="btn green" id="healEnemy">現在HP全回復</button><button class="btn gold" id="saveEnemies">討伐設定保存</button><button class="btn" id="addEnemy">敵を追加</button><button class="btn red" id="resetBattle">初期10体へ戻す</button></div></div>'
    + '<div class="panel"><h2>討伐一覧</h2><p class="tiny">背景は背景7種、敵画像は敵10体だけをプルダウンで選択。ファイル名を手入力しないので入力ミスを防げます。</p><div class="list">'+rows+'</div></div>'
    + '</div>'
}

function bind(){
 const sp=$('saveProduct'); if(sp)sp.onclick=saveProduct; const cp=$('clearProductForm'); if(cp)cp.onclick=()=>render(); const pf=$('pImageFile'); if(pf)pf.onchange=readProductImage; document.querySelectorAll('[data-catopen]').forEach(b=>b.onclick=()=>{const wrap=b.closest('.category-block'); if(wrap)wrap.classList.toggle('open')}); document.querySelectorAll('[data-editp]').forEach(b=>b.onclick=()=>editProduct(b.dataset.editp)); document.querySelectorAll('[data-delp]').forEach(b=>b.onclick=()=>{if(confirm('削除しますか？')){state.products=state.products.filter(p=>p.id!==b.dataset.delp);render();toast('削除しました')}});
 document.querySelectorAll('[data-oq]').forEach(b=>b.onclick=()=>{let o=state.orders.find(x=>x.id===b.dataset.oq); if(o){o.qty+=Number(b.dataset.d); if(o.qty<=0)state.orders=state.orders.filter(x=>x.id!==b.dataset.oq); render()}}); document.querySelectorAll('[data-cancelitem]').forEach(b=>b.onclick=()=>cancelItem(b.dataset.cancelitem)); const ca=$('cancelAll'); if(ca)ca.onclick=cancelAll;
 const sg=$('saveGasFromOrders'); if(sg)sg.onclick=()=>{state.settings.gasUrl=$('gasFetchUrl').value.trim();save();render();toast('GAS URL保存')}; const fg=$('fetchGasOrders'); if(fg)fg.onclick=fetchGas; const fg2=$('fetchGasOrders2'); if(fg2)fg2.onclick=fetchGas; bindGasButtons();
 const pc=$('prevEnemy'); if(pc)pc.onclick=()=>{state.settings.currentEnemyIndex=Math.max(0,(Number(state.settings.currentEnemyIndex)||0)-1);save();render()}; const nx=$('nextEnemy'); if(nx)nx.onclick=()=>{state.settings.currentEnemyIndex=Math.min((state.settings.enemies||[]).length-1,(Number(state.settings.currentEnemyIndex)||0)+1);save();render()}; const he=$('healEnemy'); if(he)he.onclick=()=>{let e=currentEnemy();e.hp=e.maxHp;save();render()}; const rb=$('resetBattle'); if(rb)rb.onclick=()=>{if(confirm('討伐進行をリセットしますか？')){state.settings.enemies=defaultEnemies();state.settings.currentEnemyIndex=0;save();render()}}; const se=$('saveEnemies'); if(se)se.onclick=saveEnemies; document.querySelectorAll('[data-enemy]').forEach(inp=>inp.onchange=()=>saveEnemyAt(Number(inp.dataset.enemy), false)); document.querySelectorAll('[data-saveenemy]').forEach(b=>b.onclick=()=>saveEnemyAt(Number(b.dataset.saveenemy), true)); document.querySelectorAll('[data-currentenemy]').forEach(b=>b.onclick=()=>{saveEnemyAt(Number(b.dataset.currentenemy), false); state.settings.currentEnemyIndex=Number(b.dataset.currentenemy);save();render();toast('現在の敵を変更しました')});
 document.querySelectorAll('[data-healenemy]').forEach(b=>b.onclick=()=>{const e=state.settings.enemies[Number(b.dataset.healenemy)]; if(e){e.hp=e.maxHp;save();render();toast('HPを全回復しました')}}); const ae=$('addEnemy'); if(ae)ae.onclick=()=>{const base=defaultEnemies()[0]; state.settings.enemies.push(Object.assign({},base,{id:'custom_'+uid(),name:'新しい敵',stage:'草原',hp:100,maxHp:100,bg:'grass.png',background:'grass.png',image:'slime.png',bgm:''}));save();render();toast('敵を追加しました')}; document.querySelectorAll('[data-dupenemy]').forEach(b=>b.onclick=()=>{const src=state.settings.enemies[Number(b.dataset.dupenemy)]; if(src){const copy=Object.assign({},src,{id:(src.id||'enemy')+'_copy_'+uid(),hp:Number(src.maxHp||src.hp||100)}); state.settings.enemies.splice(Number(b.dataset.dupenemy)+1,0,copy);save();render();toast('敵を複製しました')}}); document.querySelectorAll('[data-delenemy]').forEach(b=>b.onclick=()=>{const i=Number(b.dataset.delenemy); if(state.settings.enemies.length<=1){toast('敵は最低1体必要です');return} if(confirm('この敵を削除しますか？')){state.settings.enemies.splice(i,1);state.settings.currentEnemyIndex=Math.max(0,Math.min(state.settings.currentEnemyIndex,state.settings.enemies.length-1));save();render();toast('敵を削除しました')}}); document.querySelectorAll('[data-delcustomer]').forEach(b=>b.onclick=()=>{const id=b.dataset.delcustomer; const c=state.customers.find(x=>x.id===id); if(c&&confirm('顧客「'+(c.name||'')+'」を削除しますか？')){state.customers=state.customers.filter(x=>x.id!==id); if(state.currentCustomerId===id){state.currentCustomerId='';state.currentCustomer=''} save();render();toast('顧客データを削除しました')}});
 const sn=$('saveNotice'); if(sn)sn.onclick=()=>{state.settings.notice={enabled:$('noticeEnabled').checked,title:$('noticeTitle').value,body:$('noticeBody').value,position:$('noticePos').value};render();toast('お知らせ保存')}; const svN=$('saveNotify'); if(svN)svN.onclick=()=>{state.settings.notifyOn=$('notifyOn').checked;state.settings.gasUrl=$('gasUrl').value.trim();save();render();toast('通知設定保存')}; const tn=$('testNotify'); if(tn)tn.onclick=()=>sendTest(); const sd=$('saveDesign'); if(sd)sd.onclick=()=>{state.settings.design={bg:$('designBg').value,bgm:$('designBgm').value};render();toast('デザイン保存')}; const ex=$('exportData'); if(ex)ex.onclick=()=>$('exportBox').value=JSON.stringify(state,null,2); const im=$('importData'); if(im)im.onclick=()=>{try{state=migrate(JSON.parse($('importBox').value));render();toast('インポート完了')}catch(e){toast('JSONが不正です')}}; const rs=$('resetAll'); if(rs)rs.onclick=()=>{if(confirm('本当に全データを初期化しますか？')){state=defaults();localStorage.removeItem(KEY);localStorage.removeItem(OLD);save();render();toast('初期化しました')}}; const sc=$('saveCustomers'); if(sc)sc.onclick=saveCustomers; const cs=$('copySales'); if(cs)cs.onclick=()=>{navigator.clipboard&&navigator.clipboard.writeText($('salesCopy').value);toast('コピーしました')}; }
function showPreview(src){const img=$('pPreview'); if(!img)return; if(src){img.src=fileUrl(src);img.style.display='block'}else{img.removeAttribute('src');img.style.display='none'}}
function readProductImage(){const input=$('pImageFile'); if(!input||!input.files||!input.files[0])return; const file=input.files[0]; if(!file.type.startsWith('image/')){toast('画像ファイルを選んでください');return} const reader=new FileReader(); reader.onload=function(){ $('pImage').value=reader.result; showPreview(reader.result); toast('画像を読み込みました')}; reader.readAsDataURL(file)}
function saveProduct(){let id=$('pId').value||uid(); let p=state.products.find(x=>x.id===id); if(!p){p={id};state.products.push(p)} Object.assign(p,{cat:$('pCat').value,name:$('pName').value.trim()||'名称未設定',price:Number($('pPrice').value)||0,emoji:$('pEmoji').value||'🍽️',image:$('pImage').value.trim(),desc:$('pDesc').value,hidden:$('pHidden').checked}); render();toast('商品保存')}
function editProduct(id){let p=state.products.find(x=>x.id===id); if(!p)return; $('pId').value=p.id;$('pCat').value=p.cat;$('pName').value=p.name;$('pPrice').value=p.price;$('pEmoji').value=p.emoji||'';$('pImage').value=p.image||'';$('pDesc').value=p.desc||'';$('pHidden').checked=!!p.hidden; showPreview(p.image||''); window.scrollTo(0,0)}
function cancelItem(id){let o=state.orders.find(x=>x.id===id); let p=state.products.find(x=>x.id===id); if(!o||!p)return; const reason=($('cancelReason')&&$('cancelReason').value)||'商品取消'; state.sales.push({id:uid(),type:'cancel',customer:state.currentCustomer||'端末内注文',items:[{id:p.id,name:p.name,qty:o.qty,price:p.price,subtotal:p.price*o.qty}],total:p.price*o.qty,time:new Date().toISOString(),timeText:new Date().toLocaleString('ja-JP',{timeZone:'Asia/Tokyo'}),reason}); state.orders=state.orders.filter(x=>x.id!==id); render();toast('取消として保存しました')}
function cancelAll(){const items=orderItems(); if(!items.length){toast('受注がありません');return} const reason=$('cancelReason').value||'全キャンセル'; state.sales.push({id:uid(),type:'cancel',customer:state.currentCustomer||'端末内注文',items,total:items.reduce((s,i)=>s+i.subtotal,0),time:new Date().toISOString(),timeText:new Date().toLocaleString('ja-JP',{timeZone:'Asia/Tokyo'}),reason}); state.orders=[]; render();toast('全キャンセルを保存しました')}
function normalizeEnemy(e,i){if(!e.id)e.id='enemy_'+(i+1)+'_'+uid(); e.bg=assetFile(STAGE_ASSETS,e.bg||e.background||e.stage,'grass.png'); e.background=e.bg; e.image=assetFile(ENEMY_ASSETS,e.image||e.name,'slime.png'); e.stage=assetLabel(STAGE_ASSETS,e.stage||e.bg)||'草原'; e.maxHp=Math.max(1,Number(e.maxHp||e.hp||100)); e.hp=Math.max(0,Math.min(Number(e.hp||0),e.maxHp)); return e}
function saveEnemyAt(i, showToast){const e=state.settings.enemies[Number(i)]; if(!e)return; document.querySelectorAll('[data-enemy="'+i+'"]').forEach(inp=>{let f=inp.dataset.field; let v=inp.value; if(f==='hp'||f==='maxHp')v=Number(v)||0; if(f==='bg')v=assetFile(STAGE_ASSETS,v,'grass.png'); if(f==='image')v=assetFile(ENEMY_ASSETS,v,'slime.png'); e[f]=v; if(f==='bg')e.background=v;}); normalizeEnemy(e,Number(i)); save(); if(showToast)toast('#'+(Number(i)+1)+' '+(e.name||'敵')+' を保存しました')}
function saveEnemies(){document.querySelectorAll('[data-enemy]').forEach(inp=>{let e=state.settings.enemies[Number(inp.dataset.enemy)]; if(!e)return; let f=inp.dataset.field; let v=inp.value; if(f==='hp'||f==='maxHp')v=Number(v)||0; if(f==='bg')v=assetFile(STAGE_ASSETS,v,'grass.png'); if(f==='image')v=assetFile(ENEMY_ASSETS,v,'slime.png'); e[f]=v; if(f==='bg')e.background=v;}); state.settings.enemies.forEach((e,i)=>normalizeEnemy(e,i)); render();toast('討伐設定を保存しました')}
function saveCustomers(){document.querySelectorAll('[data-customer]').forEach(inp=>{let c=state.customers.find(x=>x.id===inp.dataset.customer); if(c){let f=inp.dataset.field;c[f]=f==='level'?Number(inp.value)||1:inp.value}});render();toast('顧客情報保存')}
function logGas(action,orderId,result){state.settings.gasLog=state.settings.gasLog||[]; state.settings.gasLog.push({action,orderId,result,time:new Date().toISOString(),timeText:new Date().toLocaleString('ja-JP',{timeZone:'Asia/Tokyo'})}); state.settings.gasLog=state.settings.gasLog.slice(-30); save()}
async function fetchGas(){const input=$('gasFetchUrl'); const url=((input&&input.value)||state.settings.gasUrl||DEFAULT_GAS_URL||'').trim(); if(!url){toast('GAS URLを入力');return} state.settings.gasUrl=url; save(); const box=$('gasResult'); if(box)box.innerHTML='<div class="empty">共有注文を取得中...</div>'; try{let r=await fetch(url+(url.includes('?')?'&':'?')+'action=listOrders&t='+Date.now(),{cache:'no-store'}); let t=await r.text(); let data; try{data=JSON.parse(t)}catch(e){r=await fetch(url+(url.includes('?')?'&':'?')+'action=list&t='+Date.now(),{cache:'no-store'}); t=await r.text(); data=JSON.parse(t)} const orders=normalizeGasOrders(data); state.settings.sharedOrders=orders; save(); if(box)box.innerHTML=renderGasOrdersHtml(orders); bindGasButtons(); logGas('listOrders','',orders.length+'件取得'); toast('共有注文を同期しました')}catch(e){if(box)box.innerHTML='<div class="code">取得失敗: '+esc(e.message)+'\nGAS URL・デプロイ・アクセス権を確認してください。\n?action=listOrders がJSONを返す必要があります。</div>'; logGas('listOrders','','取得失敗 '+e.message); toast('共有注文の取得に失敗')}}
function renderGasOrdersHtml(orders){if(!Array.isArray(orders)||!orders.length)return '<div class="empty">共有注文はありません。注文後に「共有注文を同期」を押してください。</div>'; return orders.map(o=>{const id=esc(getGasOrderId(o)); const status=esc(getGasStatus(o)); const rawItems=Array.isArray(o.items)?o.items:[]; const statusClass='status-'+status; const items=rawItems.length?rawItems.map((i,idx)=>{const itemId=esc(i.itemId||i.id||idx); const qty=Number(i.qty||1); return '<div class="gas-mini">'+esc(i.name||'商品')+' × '+qty+'（'+yen(i.subtotal||((i.price||0)*qty))+'） <button class="btn small" data-gasact="itemMinus" data-gasid="'+id+'" data-itemid="'+itemId+'" data-qty="'+qty+'">−</button> <button class="btn small" data-gasact="itemPlus" data-gasid="'+id+'" data-itemid="'+itemId+'" data-qty="'+qty+'">＋</button> <button class="btn red small" data-gasact="itemCancel" data-gasid="'+id+'" data-itemid="'+itemId+'">商品取消</button></div>'}).join(''):esc(o.items||''); return '<div class="gas-order '+(status==='cancelled'||status==='cancel'?'cancel':status==='received'||status==='done'?'done':'')+'"><b class="goldtxt">'+esc(o.adventurer||o.customer||o.name||'未登録')+'</b> <span class="badge '+statusClass+'">'+status+'</span><div>'+items+'</div><div class="tiny">ID: '+id+' / '+esc(o.timeText||o.time||'')+' / '+yen(o.total||0)+'</div><div class="gas-actions"><button class="btn small" data-gasact="done" data-gasid="'+id+'">受領済み</button><button class="btn red small" data-gasact="cancel" data-gasid="'+id+'">全キャンセル</button></div></div>'}).join('')}
function bindGasButtons(){document.querySelectorAll('[data-gasact]').forEach(b=>b.onclick=()=>sendGasAction(b.dataset.gasid,b.dataset.gasact,b.dataset.itemid,Number(b.dataset.qty||0)))}
async function sendGasAction(id,action,itemId,currentQty){const input=$('gasFetchUrl'); const url=((input&&input.value)||state.settings.gasUrl||DEFAULT_GAS_URL||'').trim(); if(!url||!id){toast('GAS URL/注文IDなし');return} const reason=($('cancelReason')&&$('cancelReason').value)||''; let payload={orderId:id,reason,time:new Date().toISOString(),source:'admin'}; if(action==='done'){payload.action='markReceived'} else if(action==='cancel'){if(!confirm('この注文を全キャンセルしますか？'))return; payload.action='cancelOrder'} else if(action==='itemCancel'){if(!confirm('この商品を取消しますか？'))return; payload.action='cancelItem'; payload.itemId=itemId} else if(action==='itemPlus'||action==='itemMinus'){payload.action='updateQty'; payload.itemId=itemId; payload.qty=Math.max(0,(Number(currentQty)||0)+(action==='itemPlus'?1:-1))} else {payload.action='adminUpdate';payload.update=action;payload.itemId=itemId||''} try{await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)}); logGas(payload.action,id,'送信'); toast('GASへ更新依頼を送信しました'); setTimeout(fetchGas,900)}catch(e){logGas(action,id,'送信失敗 '+e.message); toast('GAS送信失敗')}}
async function sendTest(){const url=($('gasUrl').value||'').trim(); if(!url){toast('URL未設定');return} try{await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'test',message:'おたく場ギルド通知テスト',time:new Date().toISOString()})});toast('通知テスト送信')}catch(e){toast('送信失敗')}}
initTabs(); render();
})();
</script><script>(function(){const input=document.getElementById('adminPassInput');const btn=document.getElementById('adminLoginBtn');const err=document.getElementById('adminLoginError');function login(){if((input.value||'').trim()==='OTAKU'){try{localStorage.removeItem('otakubaAdminAuth.v1');sessionStorage.setItem('otakubaAdminSession.v1','ok')}catch(e){}document.documentElement.classList.remove('admin-locked');err.textContent=''}else{err.textContent='パスワードが違います';input.value='';input.focus()}}if(btn)btn.onclick=login;if(input)input.addEventListener('keydown',e=>{if(e.key==='Enter')login()});const out=document.getElementById('adminLogoutBtn');if(out)out.onclick=function(){try{localStorage.removeItem('otakubaAdminAuth.v1');sessionStorage.removeItem('otakubaAdminSession.v1')}catch(e){}document.documentElement.classList.add('admin-locked');if(input){input.value='';setTimeout(()=>input.focus(),50)}}})();</script></body></html>
